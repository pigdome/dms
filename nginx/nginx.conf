upstream django {
    server web:8000;
}

server {
    listen 80;
    server_name _;

    # B5 fix: Nginx serve /media/ และ /static/ โดยตรง
    # ไม่ต้องพึ่ง Django dev server สำหรับ static/media files

    # Static files — served directly by Nginx (ไม่ผ่าน Django)
    location /static/ {
        alias /app/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Media files — served directly by Nginx (ไม่ผ่าน Django)
    location /media/ {
        alias /app/media/;
        expires 7d;
        add_header Cache-Control "public";
    }

    # Health check — ไม่ผ่าน upstream เพื่อลด load
    location = /health/ {
        proxy_pass http://django;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        access_log off;
    }

    # Application — ส่งต่อไป Django/Gunicorn
    location / {
        proxy_pass http://django;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # ป้องกัน timeout สำหรับ request ที่ใช้เวลานาน (เช่น export CSV)
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
        client_max_body_size 20M;
    }
}
