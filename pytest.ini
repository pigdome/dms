[pytest]
DJANGO_SETTINGS_MODULE = config.settings
python_files = tests.py tests_*.py *_tests.py
python_classes = *Tests *Test
python_functions = test_*
# I8: addopts = --reuse-db ใช้กับ pytest-django เพื่อ reuse test DB ระหว่าง test runs
# ลบ --reuse-db ออกถ้าต้องการ fresh DB ทุกครั้ง
addopts = --tb=short
